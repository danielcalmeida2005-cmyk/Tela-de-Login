<!DOCTYPE html>
<html lang="pt-bt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./Create an account/CreateAccount.css">

    <title>Create an account</title>
</head>

<body>
    <main>

        <section class="container">

            <h1>Create an <span>account</span></h1>

            <form class="Inputs">
                <div class="icon">

                    <i class="fa-solid fa-user"></i>
                    <div class="CaixaEmail">

                        <input type="email" placeholder="username or Email">
                    </div>
                </div>

                <div class="ContainerSenha">
                    <div class="icon">

                        <i class="fa-solid fa-lock"></i>
                        <div class="CaixaSenha">

                            <input type="password" placeholder="Password">

                        </div>

                    </div>
                   
                </div>

                
                <div class="ContainerSenha">
                    <div class="icon">

                        <i class="fa-solid fa-lock"></i>
                        <div class="CaixaSenha  ConfirmSenha">

                            <input type="password" placeholder="Confirm password">

                        </div>

                    </div>
                   
                </div>
            </form>
            <div class="Start">
                <h2>Register</h2>

                <button>
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>

            <div class="entraCom">
                <p>Sign in with</p>
                <div class="formas">
                    <button>
                        <i class="fa-brands fa-google"></i>
                    </button>

                    <button>
                        <i class="fa-brands fa-facebook"></i>
                    </button>

                    <button>
                        <i class="fa-brands fa-telegram"></i>
                    </button>
                </div>
            </div>
         
        </section>
    </main>
    <script src="./Create an account/CreateAccount.js"></script>
</body>

</html>
