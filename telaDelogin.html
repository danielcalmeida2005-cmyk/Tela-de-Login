<!DOCTYPE html>
<html lang="pt-bt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <title>Login</title>
</head>

<body>
    <main>

        <section class="container">

            <h1>Login</h1>

            <div class="container-login">
                
                <form action="">
                    <div class="nome barra">
                        <input type="text" placeholder="Nome">

                    </div>
                    <div class="email barra">
                        <input type="email" placeholder="Exemplo:Usuario.@gmail.com">

                    </div>
                    <div class="password barra">
                        <input type="password" placeholder="Exemplo:1234">

                    </div>

                    <button type="submit">Entrar</button>
                </form>
                <div class="entraCom">
                    <button><i class="fa-brands fa-google"></i></button>
                    <button><i class="fa-brands fa-square-facebook"></i></button>
                </div>
                <div class="recuperaOuCriaConta">
                    <a href="">Esqueci senha</a>
                    <a href="">Cria Conta</a>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
